spring:
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # redis
  data:
    redis:
      host: 192.168.214.129
      port: 6379
      password: root
      ttl: 3600
      database: 0
  application:
    name: liujie-ai-code-backend
      # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.214.129:3306/ai_code
    username: root
    password: root
  profiles:
    active: local

server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000



#  knife4j配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.liujie.liujieaicode.cotroller
knife4j:
  enable: true
  setting:
    language: zh_cn

